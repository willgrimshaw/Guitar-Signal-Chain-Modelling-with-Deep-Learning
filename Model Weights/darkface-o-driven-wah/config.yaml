model:
  class_path: nablafx.system.BlackBoxSystem
  init_args:
    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        processor:
          class_path: nablafx.processors.S4
          init_args:
            num_inputs: 1
            num_outputs: 1
            num_controls: 0
            num_blocks: 8
            channel_width: 16
            s4_state_dim: 32
            batchnorm: false
            residual: true
            direct_path: false
            cond_type: tfilm
            cond_block_size: 128
            cond_num_layers: 1
            act_type: tanh
            s4_learning_rate: 0.01
    loss:
      class_path: nablafx.loss.TimeAndFrequencyDomainLoss
      init_args:
        time_domain_loss:
          class_path: torch.nn.L1Loss
          init_args:
            size_average: null
            reduce: null
            reduction: mean
        frequency_domain_loss:
          class_path: auraloss.freq.MultiResolutionSTFTLoss
          init_args:
            fft_sizes:
            - 1024
            - 2048
            - 512
            hop_sizes:
            - 120
            - 240
            - 50
            win_lengths:
            - 600
            - 1200
            - 240
            window: hann_window
            w_sc: 1.0
            w_log_mag: 1.0
            w_lin_mag: 0.0
            w_phs: 0.0
            sample_rate: null
            scale: null
            n_bins: null
            perceptual_weighting: false
            scale_invariance: false
            eps: 1.0e-08
            output: loss
            reduction: mean
            mag_distance: L1
            device: null
        time_domain_weight: 0.5
        frequency_domain_weight: 0.5
    lr: 0.01
    log_media_every_n_steps: 3000
data:
  class_path: nablafx.data.DryWetFilesPluginDataModule
  init_args:
    root_dir_dry: data/TONETWIST-AFX-DATASET/CUSTOM/DRY-with-markers/trainval
    root_dir_wet: data/TONETWIST-AFX-DATASET/CUSTOM/Darkface-O-Driven-Wah/trainval
    params_idxs_to_use: null
    data_to_use: 1.0
    trainval_split: 0.9
    sample_length: 144000
    sample_rate: 48000
    preload: true
    batch_size: 16
    num_workers: 4
